<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой дневник</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
    }

    .container {
      max-width: 600px;
      margin: 20px auto;
      padding: 10px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      background: #111;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    .entry {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .date {
      font-size: 12px;
      color: gray;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

<header>📓 Мой личный дневник</header>

<div class="container">
  <textarea id="text" placeholder="Напиши свои мысли..."></textarea>
  <button onclick="addEntry()">Сохранить</button>

  <div id="entries"></div>
</div>

<script>
  let entries = JSON.parse(localStorage.getItem('diary')) || [];

  function render() {
    const container = document.getElementById('entries');
    container.innerHTML = '';
    
    entries.reverse().forEach(entry => {
      const div = document.createElement('div');
      div.className = 'entry';

      div.innerHTML = `
        <div class="date">${entry.date}</div>
        <div>${entry.text}</div>
      `;

      container.appendChild(div);
    });

    entries.reverse();
  }

  function addEntry() {
    const text = document.getElementById('text').value;
    if (!text) return;

    const entry = {
      text: text,
      date: new Date().toLocaleString()
    };

    entries.push(entry);
    localStorage.setItem('diary', JSON.stringify(entries));

    document.getElementById('text').value = '';
    render();
  }

  render();
</script>

</body>
</html>
